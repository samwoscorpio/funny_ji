<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projekt Ji - 潮汐边境</title>
    <link rel="stylesheet" href="./world.css?v=world-prototype-20260714-1" />
  </head>
  <body>
    <main class="world-shell">
      <canvas id="worldCanvas" aria-label="潮汐边境三维探索地图"></canvas>

      <header class="world-topbar">
        <div class="world-brand">
          <span class="world-kicker">Projekt Ji · 世界地图原型</span>
          <h1>潮汐边境</h1>
        </div>
        <div class="world-top-actions">
          <button id="worldHelpBtn" type="button">探索指引</button>
          <button id="worldBattleBtn" type="button">完整对局</button>
          <button id="worldPracticeBtn" type="button">新手练习</button>
        </div>
      </header>

      <section class="world-quest-panel" aria-live="polite">
        <span class="world-kicker">主线任务</span>
        <h2 id="questTitle">第一章：遗迹的回声</h2>
        <p id="questDescription">与守望者交谈，确认失落据点的位置。</p>
        <div class="quest-progress"><span id="questProgress"></span></div>
      </section>

      <section class="world-status-panel" aria-label="探索状态">
        <div><span>区域</span><strong id="worldLocation">起航营地</strong></div>
        <div><span>坐标</span><strong id="worldCoordinates">0, 0</strong></div>
        <div><span>状态</span><strong id="worldState">探索中</strong></div>
      </section>

      <section class="world-camera-panel" aria-label="视角调节">
        <div class="camera-panel-head">
          <span>战术俯角</span>
          <strong id="cameraAngleValue">45°</strong>
        </div>
        <input id="cameraAngleSlider" type="range" min="30" max="60" value="45" step="1" aria-label="调整视角俯角" />
        <div class="camera-angle-labels"><span>贴近</span><span>俯视</span></div>
      </section>

      <section id="worldPrompt" class="world-prompt" aria-live="polite" hidden>
        <span class="prompt-key">E</span>
        <span id="worldPromptText">交互</span>
      </section>

      <section class="world-controls" aria-label="操作说明">
        <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动</span>
        <span><kbd>拖动鼠标</kbd> 环视</span>
        <span><kbd>E</kbd> 交互</span>
        <span><kbd>练习裂隙</kbd> 经典武者教学</span>
      </section>

      <div id="worldModal" class="world-modal-backdrop" hidden>
        <section class="world-modal" role="dialog" aria-modal="true" aria-labelledby="worldModalTitle">
          <button id="worldModalClose" class="world-modal-close" type="button" aria-label="关闭">×</button>
          <span id="worldModalKicker" class="world-kicker">潮汐边境</span>
          <h2 id="worldModalTitle">探索指引</h2>
          <div id="worldModalBody"></div>
        </section>
      </div>

      <div id="worldLoading" class="world-loading">正在唤醒潮汐边境...</div>
    </main>
    <script>
      window.__JI_WORLD_READY__ = false;
      window.addEventListener("error", () => {
        const loading = document.querySelector("#worldLoading");
        if (loading && !window.__JI_WORLD_READY__) {
          loading.textContent = "3D 场景未能启动，请刷新后重试。";
        }
      }, true);
      window.setTimeout(() => {
        const loading = document.querySelector("#worldLoading");
        if (loading && !window.__JI_WORLD_READY__) {
          loading.textContent = "3D 场景加载较慢，请检查网络后刷新。";
        }
      }, 7000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
    <script src="./classic-warrior-model.js?v=classic-warrior-3d-1"></script>
    <script src="./world.js?v=world-classic-warrior-3d-1"></script>
  </body>
</html>
