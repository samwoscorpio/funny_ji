<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projekt Ji - 战术原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="tacticalShell" class="tactical-shell" data-phase="movement">
      <header class="tactical-topbar">
        <div class="brand-lockup">
          <h1>Projekt Ji</h1>
          <span id="tacticalModeLabel" class="prototype-label">1v1 战术</span>
        </div>
        <div class="match-status" aria-live="polite">
          <span id="tacticalRound">第 1 回合</span>
          <span id="tacticalPhase" class="phase-chip">计划阶段</span>
          <span id="tacticalScore">据点分 0 : 0</span>
        </div>
        <div class="top-controls">
          <button id="tacticalManualBtn" type="button">说明书</button>
          <button id="tacticalHistoryBtn" type="button">历史对局</button>
          <button id="tacticalResetBtn" type="button">重开</button>
        </div>
      </header>

      <section class="tactical-main" aria-label="地图战术对局">
        <section class="map-panel" aria-label="8乘8战术地图">
          <div class="map-heading">
            <div>
              <span class="eyebrow">固定战场</span>
              <h2>潮汐遗迹</h2>
            </div>
            <p id="mapHint">选择移动路径，再选择行动卡。</p>
          </div>
          <div id="tacticalMap" class="tactical-map" role="grid" aria-label="8乘8战术地图"></div>
          <div class="terrain-legend" aria-label="地形图例">
            <span><i class="legend-swatch floor"></i>地面</span>
            <span><i class="legend-swatch bush"></i>草丛</span>
            <span><i class="legend-swatch energy"></i>能量点 +1 XP</span>
            <span><i class="legend-swatch objective"></i>中央据点</span>
          </div>
        </section>

        <aside class="enemy-panel" aria-label="敌方状态与战斗日志">
          <section id="enemyTeamOverview" class="enemy-team-overview" aria-label="敌方小队概览" hidden></section>
          <div class="enemy-team-cards" aria-label="敌方小队">
            <div id="enemyTacticalCard" class="combatant-card enemy-combatant"></div>
            <div id="enemyBTacticalCard" class="combatant-card enemy-combatant" hidden></div>
          </div>
          <section class="tactical-log-panel" aria-label="战斗日志">
            <div class="section-head"><h2>战斗日志</h2><button id="tacticalClearLog" type="button">清空</button></div>
            <ol id="tacticalLog" aria-live="polite"></ol>
          </section>
          <section class="legacy-mode-note" aria-label="旧版模式状态">
            <strong>在线房间</strong>
            <span>创建或加入房间后，双方依次同步移动与行动。</span>
          </section>
        </aside>
      </section>

      <section class="tactical-bottom" aria-label="计划操作台">
        <section id="playerTacticalCard" class="combatant-card player-combatant" aria-label="玩家状态"></section>

        <section class="action-dock" aria-label="行动卡">
          <div class="action-dock-head">
            <div>
              <span class="eyebrow">行动卡</span>
              <h2>选择本回合动作</h2>
            </div>
            <div id="actionFilters" class="action-filters" role="group" aria-label="行动类别筛选">
              <button type="button" data-filter="available" aria-pressed="true">当前可用</button>
              <button type="button" data-filter="charge" aria-pressed="false">蓄气</button>
              <button type="button" data-filter="defense" aria-pressed="false">防御</button>
              <button type="button" data-filter="range-1" aria-pressed="false">短攻</button>
              <button type="button" data-filter="range-2" aria-pressed="false">长攻</button>
              <button type="button" data-filter="special" aria-pressed="false">锦囊</button>
              <button type="button" data-filter="skill" aria-pressed="false">技能</button>
            </div>
          </div>
          <div id="tacticalCards" class="tactical-cards" aria-label="可用行动卡"></div>
        </section>

        <aside class="plan-panel" aria-label="行动预览">
          <span class="eyebrow">行动预览</span>
          <h2>本回合计划</h2>
          <dl id="tacticalPreview" class="plan-preview"></dl>
          <div class="plan-controls">
            <button id="tacticalCancelBtn" type="button">取消计划</button>
            <button id="tacticalLockBtn" type="button" disabled>锁定行动</button>
          </div>
        </aside>
      </section>

      <section class="setup-strip" aria-label="对战设置">
        <div class="setup-mode" role="group" aria-label="对战模式">
          <span>模式</span>
          <button id="tacticalDuelMode" type="button" data-battle-mode="duel" aria-pressed="true">1v1</button>
          <button id="tacticalTrioMode" type="button" data-battle-mode="trio" aria-pressed="false">1v2</button>
          <button id="tacticalOnlineMode" type="button" data-battle-mode="online" aria-pressed="false">在线 1v1</button>
        </div>
        <label>玩家昵称<input id="tacticalPlayerName" maxlength="16" autocomplete="nickname" /></label>
        <label>你的英雄<select id="tacticalPlayerHero"></select></label>
        <label>电脑 A<select id="tacticalEnemyHero"></select></label>
        <label class="enemy-b-setting" hidden>电脑 B<select id="tacticalEnemyBHero"></select></label>
        <div id="tacticalSpawnSettings" class="spawn-settings" aria-label="出生点设置">
          <span>出生点</span>
          <label>玩家<select id="tacticalPlayerSpawn"></select></label>
          <label>电脑 A<select id="tacticalEnemySpawn"></select></label>
          <label class="enemy-b-setting" hidden>电脑 B<select id="tacticalEnemyBSpawn"></select></label>
          <button id="tacticalDefaultSpawns" type="button" title="恢复当前模式默认出生点">默认</button>
        </div>
        <div id="tacticalRoomSettings" class="room-settings" aria-label="在线房间" hidden>
          <span>在线房间</span>
          <button id="tacticalCreateRoom" type="button">创建房间</button>
          <label>房间代码<input id="tacticalRoomCode" maxlength="6" autocapitalize="characters" autocomplete="off" /></label>
          <button id="tacticalJoinRoom" type="button">加入</button>
          <strong id="tacticalRoomStatus">选择在线 1v1 后创建或加入房间。</strong>
        </div>
        <button id="tacticalApplyHeroes" class="apply-setup" type="button">开始新对局</button>
      </section>
    </main>

    <div id="tacticalModal" class="tactical-modal-backdrop" hidden>
      <section class="tactical-modal" role="dialog" aria-modal="true" aria-labelledby="tacticalModalTitle">
        <button id="tacticalModalClose" class="modal-close" type="button" aria-label="关闭">×</button>
        <h2 id="tacticalModalTitle">说明书</h2>
        <div id="tacticalModalBody"></div>
      </section>
    </div>

    <script>window.__JI_TACTICAL_REBUILD__ = true;</script>
    <script src="./game.js"></script>
    <script src="./tactical.js"></script>
  </body>
</html>
