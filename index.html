<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projekt Ji - 战术原型</title>
    <link rel="stylesheet" href="./styles.css?v=spawn-editor-20260712-2" />
  </head>
  <body>
    <main id="tacticalShell" class="tactical-shell" data-phase="movement">
      <section class="tactical-main" aria-label="地图战术对局">
        <section class="map-panel" aria-label="8乘8战术地图">
          <div class="map-heading">
            <div>
              <span class="eyebrow">固定战场</span>
              <h2>潮汐遗迹</h2>
            </div>
            <p id="mapHint">选择移动路径，再选择行动卡。</p>
          </div>
          <div id="tacticalMap" class="tactical-map" role="grid" aria-label="8乘8战术地图"></div>
          <div class="terrain-legend" aria-label="地形图例">
            <span><i class="legend-swatch floor"></i>地面</span>
            <span><i class="legend-swatch bush"></i>草丛 · 隐形</span>
            <span><i class="legend-swatch energy"></i>能量点 +1 XP</span>
            <span><i class="legend-swatch objective"></i>中央据点</span>
            <span><i class="legend-swatch thin-wall"></i>薄墙</span>
            <span><i class="legend-swatch wall"></i>巨石</span>
          </div>
        </section>

        <aside class="enemy-panel" aria-label="敌方状态与战斗日志">
          <section class="side-brand" aria-label="游戏标题">
            <h1>Projekt Ji</h1>
            <span id="tacticalModeLabel" class="prototype-label">1v1 战术</span>
          </section>
          <section id="enemyTeamOverview" class="enemy-team-overview" aria-label="敌方小队概览" hidden></section>
          <div class="enemy-team-cards" aria-label="敌方小队">
            <div id="enemyTacticalCard" class="combatant-card enemy-combatant"></div>
            <div id="enemyBTacticalCard" class="combatant-card enemy-combatant" hidden></div>
          </div>
          <section class="tactical-log-panel" aria-label="战斗摘要">
            <div class="section-head">
              <h2>战斗摘要</h2>
              <div class="log-head-actions">
                <button id="tacticalExpandLog" type="button">展开</button>
                <button id="tacticalClearLog" type="button">清空</button>
              </div>
            </div>
            <ol id="tacticalLog" aria-live="polite"></ol>
          </section>
          <section class="side-match-panel" aria-label="对局状态">
            <div class="match-status" aria-live="polite">
              <span id="tacticalRound">第 1 回合</span>
              <span id="tacticalPhase" class="phase-chip">计划阶段</span>
              <span id="tacticalScore">据点分 0 : 0</span>
            </div>
            <div class="top-controls">
              <button id="tacticalScoringBtn" type="button">计分规则</button>
              <button id="tacticalManualBtn" type="button">说明书</button>
              <button id="tacticalHistoryBtn" type="button">历史对局</button>
              <button id="tacticalResetBtn" type="button">重开</button>
            </div>
          </section>
          <section class="legacy-mode-note" aria-label="旧版模式状态">
            <strong>在线房间</strong>
            <span>创建或加入房间后，双方依次同步移动与行动。</span>
          </section>
        </aside>
      </section>

      <section class="tactical-bottom" aria-label="计划操作台">
        <div class="player-team-dock">
          <section id="playerTeamOverview" class="player-team-overview" aria-label="己方小队" hidden></section>
          <section id="playerTacticalCard" class="combatant-card player-combatant" aria-label="玩家状态"></section>
        </div>

        <section class="action-dock" aria-label="行动卡">
          <div class="action-dock-head">
            <div>
              <span class="eyebrow">行动卡</span>
              <h2>选择本回合动作</h2>
            </div>
            <button id="battleMageImprintBtn" class="battle-mage-toggle" type="button" aria-pressed="false" hidden>表</button>
            <div id="actionFilters" class="action-filters" role="group" aria-label="行动类别筛选">
              <button type="button" data-filter="available" aria-pressed="true">当前可用</button>
              <button type="button" data-filter="charge" aria-pressed="false">蓄气</button>
              <button type="button" data-filter="defense" aria-pressed="false">防御</button>
              <button type="button" data-filter="range-1" aria-pressed="false">短攻</button>
              <button type="button" data-filter="range-2" aria-pressed="false">长攻</button>
              <button type="button" data-filter="special" aria-pressed="false">锦囊</button>
              <button type="button" data-filter="skill" aria-pressed="false">技能</button>
            </div>
          </div>
          <div id="tacticalCards" class="tactical-cards" aria-label="可用行动卡"></div>
        </section>

        <aside class="plan-panel" aria-label="行动预览">
          <span class="eyebrow">行动预览</span>
          <h2>本回合计划</h2>
          <dl id="tacticalPreview" class="plan-preview"></dl>
          <div class="plan-controls">
            <button id="tacticalCancelBtn" type="button">取消计划</button>
            <button id="tacticalLockBtn" type="button" disabled>锁定行动</button>
          </div>
        </aside>
      </section>

      <section class="setup-strip" aria-label="对战设置">
        <div class="setup-mode" role="group" aria-label="对战模式">
          <span>模式</span>
          <button id="tacticalDuelMode" type="button" data-battle-mode="duel" aria-pressed="true">1v1</button>
          <button id="tacticalTrioMode" type="button" data-battle-mode="trio" aria-pressed="false">1v2</button>
          <button id="tacticalTeamMode" type="button" data-battle-mode="team" aria-pressed="false">2v2</button>
          <button id="tacticalOnlineMode" type="button" data-battle-mode="online" aria-pressed="false">在线 1v1</button>
          <button id="tacticalOnlineTeamMode" type="button" data-battle-mode="online-team" aria-pressed="false">在线 2v2</button>
        </div>
        <label>玩家昵称<input id="tacticalPlayerName" maxlength="16" autocomplete="nickname" /></label>
        <label>你的英雄 A<select id="tacticalPlayerHero"></select></label>
        <label class="player-b-setting" hidden>你的英雄 B<select id="tacticalPlayerBHero"></select></label>
        <label>电脑 A<select id="tacticalEnemyHero"></select></label>
        <label class="enemy-b-setting" hidden>电脑 B<select id="tacticalEnemyBHero"></select></label>
        <div id="tacticalSpawnSettings" class="spawn-settings" aria-label="出生点设置" hidden>
          <span>出生点</span>
          <label>玩家 A<input id="tacticalPlayerSpawnInput" class="spawn-coordinate-input" maxlength="2" inputmode="text" autocomplete="off" placeholder="C4" aria-label="玩家 A 出生点，例如 C4" /><select id="tacticalPlayerSpawn" hidden></select></label>
          <label class="player-b-setting" hidden>玩家 B<input id="tacticalPlayerBSpawnInput" class="spawn-coordinate-input" maxlength="2" inputmode="text" autocomplete="off" placeholder="E3" aria-label="玩家 B 出生点，例如 E3" /><select id="tacticalPlayerBSpawn" hidden></select></label>
          <label>电脑 A<input id="tacticalEnemySpawnInput" class="spawn-coordinate-input" maxlength="2" inputmode="text" autocomplete="off" placeholder="B2" aria-label="电脑 A 出生点，例如 B2" /><select id="tacticalEnemySpawn" hidden></select></label>
          <label class="enemy-b-setting" hidden>电脑 B<input id="tacticalEnemyBSpawnInput" class="spawn-coordinate-input" maxlength="2" inputmode="text" autocomplete="off" placeholder="B7" aria-label="电脑 B 出生点，例如 B7" /><select id="tacticalEnemyBSpawn" hidden></select></label>
          <button id="tacticalDefaultSpawns" type="button" title="恢复当前模式默认出生点">默认</button>
        </div>
        <button id="tacticalMapEditorBtn" type="button" aria-pressed="false">地图编辑器</button>
        <div id="tacticalMapEditor" class="map-editor-panel" aria-label="地图编辑器" hidden>
          <div class="map-editor-head">
            <strong>地图编辑器</strong>
            <span id="mapEditorHint">选择工具后点击地图。</span>
          </div>
          <div class="map-library-controls" aria-label="保存的地图">
            <label>地图名<input id="mapEditorName" maxlength="20" autocomplete="off" /></label>
            <label>已保存<select id="mapEditorLibrary"></select></label>
            <button id="mapEditorLoad" type="button">载入</button>
            <button id="mapEditorDelete" type="button">删除</button>
          </div>
          <div id="mapEditorTools" class="map-editor-tools" role="group" aria-label="地图工具">
            <button type="button" data-map-tool="spawn-player" aria-pressed="false">我方 A</button>
            <button type="button" data-map-tool="spawn-player-b" aria-pressed="false">我方 B</button>
            <button type="button" data-map-tool="spawn-enemy" aria-pressed="false">敌方 A</button>
            <button type="button" data-map-tool="spawn-enemy-b" aria-pressed="false">敌方 B</button>
            <button type="button" data-map-tool="objective" aria-pressed="true">据点</button>
            <button type="button" data-map-tool="energy" aria-pressed="false">能量点</button>
            <button type="button" data-map-tool="bush" aria-pressed="false">草丛</button>
            <button type="button" data-map-tool="wall" aria-pressed="false">巨石</button>
            <button type="button" data-map-tool="thin-wall" aria-pressed="false">薄墙</button>
            <button type="button" data-map-tool="erase" aria-pressed="false">擦除</button>
          </div>
          <div id="mapEditorSpawnStatus" class="map-editor-spawn-status" aria-live="polite"></div>
          <div class="map-editor-actions">
            <button id="mapEditorSave" type="button">保存地图</button>
            <button id="mapEditorReset" type="button">恢复默认</button>
            <button id="mapEditorCancel" type="button">退出编辑</button>
          </div>
        </div>
        <div id="tacticalRoomSettings" class="room-settings" aria-label="在线房间" hidden>
          <span>在线房间</span>
          <button id="tacticalCreateRoom" type="button">创建房间</button>
          <label>房间代码<input id="tacticalRoomCode" maxlength="6" autocapitalize="characters" autocomplete="off" /></label>
          <button id="tacticalJoinRoom" type="button">加入</button>
          <strong id="tacticalRoomStatus">选择在线 1v1 后创建或加入房间。</strong>
        </div>
        <button id="tacticalApplyHeroes" class="apply-setup" type="button">开始新对局</button>
      </section>
    </main>

    <div id="tacticalModal" class="tactical-modal-backdrop" hidden>
      <section class="tactical-modal" role="dialog" aria-modal="true" aria-labelledby="tacticalModalTitle">
        <button id="tacticalModalClose" class="modal-close" type="button" aria-label="关闭">×</button>
        <h2 id="tacticalModalTitle">说明书</h2>
        <div id="tacticalModalBody"></div>
      </section>
    </div>

    <script>window.__JI_TACTICAL_REBUILD__ = true;</script>
    <script src="./game.js?v=spawn-editor-20260712-2"></script>
    <script src="./tactical.js?v=spawn-editor-20260712-2"></script>
  </body>
</html>
